name: computacao-para-meninas

options:
  bundleIdPrefix: meg
  deploymentTarget:
    iOS: "17.0"

targets:
  computacao-para-meninas:
    type: application
    platform: iOS
    sources:
      - computacao-para-meninas
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: meg.computacao-para-meninas
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1.0.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleVersion: "1"
        PRODUCT_NAME: computacao-para-meninas
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  computacao-para-meninasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - computacao-para-meninasTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: meg.computacao-para-meninasTests
    dependencies:
      - target: computacao-para-meninas

  computacao-para-meninasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - computacao-para-meninasUITests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: meg.computacao-para-meninasUITests
    dependencies:
      - target: computacao-para-meninas
