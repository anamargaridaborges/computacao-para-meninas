name: Swift CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run tests
        run:
          cd computacao-para-meninas
          xcodebuild test \
            -scheme computacao-para-meninas \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
