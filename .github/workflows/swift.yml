name: Swift CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run tests
        run: |
          cd computacao-para-meninas
          xcodegen generate
          xcodebuild test \
            -project computacao-para-meninas.xcodeproj \
            -scheme computacao-para-meninas \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
